services:
  db:
    image: postgres:15-alpine
    environment:
      # Docker create the DB and User on startup
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maistorage
      TZ: Asia/Kuala_Lumpur
      PGTZ: Asia/Kuala_Lumpur 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/maistorage
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: