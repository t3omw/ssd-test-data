version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      # These variables tell Docker to create the DB and User on startup
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maistorage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Note: Use 'db' as the host instead of 'localhost' when inside Docker
      DATABASE_URL: postgresql://user:password@db:5432/maistorage
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: